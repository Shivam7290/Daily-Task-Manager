<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Daily Task Manager</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet" />
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <nav class="navbar">
    <div class="container">
      <span class="navbar-brand">
        <i class="bi bi-check2-square me-2"></i>Daily Task Manager
      </span>
    </div>
  </nav>
  <br>


  <div class="container my-4">

    <div class="row g-3 mb-4">
      <div class="col-4">
        <div class="card stat-card text-center">
          <div class="card-body py-3">
            <h3 class="stat-number text-primary" id="totalCount">0</h3>
            <p class="stat-label mb-0">Total Tasks</p>
          </div>
        </div>
      </div>
      <div class="col-4">
        <div class="card stat-card text-center">
          <div class="card-body py-3">
            <h3 class="stat-number text-success" id="completedCount">0</h3>
            <p class="stat-label mb-0">Completed</p>
          </div>
        </div>
      </div>
      <div class="col-4">
        <div class="card stat-card text-center">
          <div class="card-body py-3">
            <h3 class="stat-number text-warning" id="pendingCount">0</h3>
            <p class="stat-label mb-0">Pending</p>
          </div>
        </div>
      </div>
    </div>

    <div class="card mb-4">
      <div class="card-header">
        <h5 class="mb-0"><i class="bi bi-plus-circle me-2"></i>Add New Task</h5>
      </div>
      <div class="card-body">
        <div class="row g-2 align-items-start">
          <div class="col-12 col-md-7">
            <input
              type="text"
              class="form-control"
              id="taskInput"
              placeholder="What do you need to do today?"
              maxlength="100"
            />
            <div class="text-danger small mt-1 d-none" id="taskError">
              Please write a task before adding!
            </div>
          </div>
          <div class="col-6 col-md-3">
            <select class="form-select" id="prioritySelect">
              <option value="low">🟢 Low Priority</option>
              <option value="medium" selected>🟡 Medium Priority</option>
              <option value="high">🔴 High Priority</option>
            </select>
          </div>
          <div class="col-6 col-md-2">
            <button type="button" class="btn btn-primary w-100" id="addBtn">
              <i class="bi bi-plus-lg me-1"></i>Add
            </button>
          </div>
        </div>
      </div>
    </div>

    <div class="d-flex gap-2 flex-wrap mb-3">
      <button type="button" class="btn btn-filter active" data-filter="all">
        <i class="bi bi-grid me-1"></i>All
      </button>
      <button type="button" class="btn btn-filter" data-filter="pending">
        <i class="bi bi-hourglass me-1"></i>Pending
      </button>
      <button type="button" class="btn btn-filter" data-filter="completed">
        <i class="bi bi-check2 me-1"></i>Completed
      </button>
    </div>

    <div id="taskList"></div>

    <div class="empty-state d-none" id="emptyState">
      <i class="bi bi-clipboard2 display-4 d-block mb-3"></i>
      <h5>No tasks here!</h5>
      <p class="small">Add a task above to get started.</p>
    </div>

  </div>

  <footer class="app-footer">
    <div class="container text-center">
      <p class="footer-text mb-0">
        Made with <i class="bi bi-heart-fill"></i> by <strong>Shivam Parashar</strong>
      </p>
    </div>
  </footer>

  <div class="modal fade" id="editModal" tabindex="-1">
    <div class="modal-dialog modal-dialog-centered">
      <div class="modal-content">
        <div class="modal-header">
          <h5 class="modal-title"><i class="bi bi-pencil-square me-2"></i>Edit Task</h5>
          <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
        </div>
        <div class="modal-body">
          <label class="form-label fw-semibold">Task Name</label>
          <input type="text" class="form-control" id="editInput" placeholder="Update your task..." />
          <div class="text-danger small mt-1 d-none" id="editError">Please write something!</div>

          <label class="form-label fw-semibold mt-3">Priority</label>
          <select class="form-select" id="editPriority">
            <option value="low">🟢 Low Priority</option>
            <option value="medium">🟡 Medium Priority</option>
            <option value="high">🔴 High Priority</option>
          </select>

          <input type="hidden" id="editId" />
        </div>
        <div class="modal-footer">
          <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancel</button>
          <button type="button" class="btn btn-primary" id="saveEditBtn">
            <i class="bi bi-check-lg me-1"></i>Save Changes
          </button>
        </div>
      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
  <script src="script.js"></script>

</body>
</html>
